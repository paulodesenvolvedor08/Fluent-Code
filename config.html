<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Configurações - FluentCode</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET TOTAL */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🔥 FIX DEFINITIVO MOBILE (SEM FAIXA BRANCA) */
html, body {
    width: 100%;
    height: 100%;
    min-height: 100%;
    min-height: 100dvh;
    overflow-x: hidden;
}

/* FUNDO REAL (NUNCA MAIS BRANCO) */
body {
    font-family: Arial, sans-serif;
    color: white;

    /* fundo fixo + cobre tudo */
    background: radial-gradient(circle at top,#1e293b,#0f172a);
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;

    display: flex;
    justify-content: center;
}

/* trava camada branca em alguns browsers */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: inherit;
    z-index: -1;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 600px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* CARD */
.card {
    background: rgba(31,41,55,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
}

/* HEADER */
.header {
    text-align: center;
    padding-top: 10px;
}

/* AVATAR */
.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    margin: auto;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    background: #0b1220;
    border: 1px solid #334155;
    color: white;
    outline: none;
}

/* BOTÃO */
.btn {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

/* BACK BUTTON */
.back {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 20px;
    z-index: 9999;

    background: linear-gradient(to right,#2563eb,#4f46e5);
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: bold;

    display: flex;
    gap: 8px;
    align-items: center;

    box-shadow: 0 10px 25px rgba(0,0,0,.5);
    cursor: pointer;
    color: white;
}

</style>
</head>

<body onload="load()">

<!-- BACK -->
<div class="back" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i> Voltar
</div>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div class="text-5xl">⚙️</div>
    <h1 class="text-2xl font-bold mt-2">Configurações</h1>
    <p class="text-sm opacity-70">Tela 100% corrigida</p>
</div>

<!-- PERFIL -->
<div class="card text-center">
    <div class="avatar" id="avatar">U</div>

    <input id="nome" placeholder="Seu nome" class="mt-3">

    <button class="btn bg-blue-600 text-white mt-3" onclick="saveName()">
        Salvar nome
    </button>
</div>

<!-- PROGRESSO -->
<div class="card">
    <h3 class="font-bold">📊 Progresso</h3>
    <p class="text-sm">XP: <span id="xp">0</span></p>
    <p class="text-sm">Nível: <span id="nivel">1</span></p>
</div>

<!-- SOM -->
<div class="card flex justify-between items-center">
    <div>
        <h3 class="font-bold">🔊 Som</h3>
        <p class="text-sm opacity-70">Efeitos do app</p>
    </div>
    <div class="toggle" id="sound" onclick="toggleSound()"></div>
</div>

<!-- APAGAR CONTA -->
<div class="card border border-red-500/40">
    <h3 class="text-red-400 font-bold">⚠️ Apagar Conta</h3>

    <p class="text-sm opacity-70 mt-2">
        Remove todos os dados permanentemente.
    </p>

    <button class="btn bg-red-600 text-white mt-3" onclick="deleteAccount()">
        Excluir conta
    </button>
</div>

</div>

<script>

function load(){
let nome = localStorage.getItem("fc_nome") || "Usuário";
document.getElementById("nome").value = nome;
document.getElementById("avatar").innerText = nome[0].toUpperCase();

let xp = parseInt(localStorage.getItem("xp") || 0);
document.getElementById("xp").innerText = xp;
document.getElementById("nivel").innerText = Math.floor(xp / 200) + 1;
}

function saveName(){
let nome = document.getElementById("nome").value;
localStorage.setItem("fc_nome", nome);
document.getElementById("avatar").innerText = nome[0].toUpperCase();
alert("Salvo!");
}

function toggleSound(){
let t = document.getElementById("sound");
t.classList.toggle("active");

localStorage.setItem("sound",
t.classList.contains("active") ? "on" : "off"
);
}

function deleteAccount(){

if(!confirm("Apagar conta?")) return;
if(!confirm("Tem certeza absoluta?")) return;

localStorage.clear();
alert("Conta apagada!");
window.location.href = "index.html";
}

</script>

</body>
</html>
