<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilhas</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
    margin:0;
    padding:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
}

/* topo estilo app */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

/* cartão principal (estilo Duolingo) */
.card{
    margin:15px;
    padding:18px;
    border-radius:20px;
    background:#1f2937;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    transition:.2s;
}

.card:hover{
    transform:scale(1.02);
}

/* progresso */
.bar{
    height:10px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
}

/* botão continuar estilo Duolingo */
.btn{
    margin-top:10px;
    background:#22c55e;
    padding:10px 14px;
    border-radius:14px;
    font-weight:bold;
    display:inline-block;
}

/* bloqueado */
.locked{
    opacity:.5;
}

/* header grande estilo app */
.hero{
    margin:15px;
    padding:20px;
    border-radius:25px;
    background: linear-gradient(135deg,#22c55e,#3b82f6);
}

.hero h1{
    font-size:22px;
    font-weight:bold;
}

.small{
    font-size:13px;
    opacity:.9;
}

/* bottom nav estilo Duolingo */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#0f172a;
    padding:10px 0;
    border-top:1px solid #1f2937;
}

.nav i{
    font-size:20px;
    opacity:.7;
}

.nav i.active{
    color:#22c55e;
    opacity:1;
}

/* botão voltar */
.back{
    position:fixed;
    bottom:70px;
    left:15px;
    background:linear-gradient(to right,#2563eb,#4f46e5);
    padding:12px 16px;
    border-radius:14px;
    font-weight:bold;
    display:flex;
    gap:8px;
    align-items:center;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topbar">
    <div>
        <b>Trilhas</b>
        <div class="small">Continue sua jornada 🚀</div>
    </div>
    <i class="fa-solid fa-fire text-orange-400"></i>
</div>

<!-- HERO (estilo Duolingo home) -->
<div class="hero">
    <h1>Continue de onde parou</h1>
    <div class="small">Trilha: Java Básico</div>
</div>

<!-- AULA ATUAL -->
<div class="card">
    <b>🔥 Variáveis em Java</b>
    <div class="small">Você está quase terminando esta lição</div>

    <div class="bar">
        <div class="fill" style="width:60%"></div>
    </div>

    <div class="btn">Continuar</div>
</div>

<!-- OUTRAS TRILHAS -->
<div class="card">
    <b>🟡 Condicionais</b>
    <div class="small">if / else e lógica</div>
</div>

<div class="card locked">
    <b>🔒 Loops</b>
    <div class="small">for / while</div>
</div>

<div class="card locked">
    <b>🔒 Projetos</b>
    <div class="small">Aplicação prática</div>
</div>

<!-- BOTÃO VOLTAR -->
<div class="back" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</div>

<!-- NAV BAR -->
<div class="nav">
    <i class="fa-solid fa-house active"></i>
    <i class="fa-solid fa-trophy"></i>
    <i class="fa-solid fa-book"></i>
    <i class="fa-solid fa-user"></i>
</div>

</body>
</html>
