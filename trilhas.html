<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FluentCode - Trilhas</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* 🔥 RESET ABSOLUTO MOBILE */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    height: 100%;
    width: 100%;
    background: #0f172a;
}

/* 🔥 FIX PRINCIPAL DO CELULAR (IMPORTANTE) */
body {
    min-height: 100vh;
    min-height: 100dvh; /* moderno (corrige iPhone/Android) */
    width: 100%;
    overflow-x: hidden;

    background: radial-gradient(circle at top,#1e293b,#0f172a);
    color: white;
    font-family: Arial, sans-serif;

    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* HERO */
.hero {
    margin: 15px;
    padding: 20px;
    border-radius: 25px;

    background: linear-gradient(135deg,#22c55e,#3b82f6);
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
}

/* MAPA OCUPA TUDO */
.map {
    position: relative;
    flex: 1; /* 🔥 faz ocupar a tela toda */
    padding: 20px 0 120px;
}

/* linha central */
.map::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 100%;
    background: linear-gradient(#334155,#0f172a);
    border-radius: 20px;
}

/* NODE */
.node {
    width: 85%;
    max-width: 420px;
    margin: 22px auto;
    padding: 16px;
    border-radius: 22px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(31,41,55,0.92);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.08);

    transition: .2s;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);

    position: relative;
    z-index: 2;
}

.node:hover {
    transform: scale(1.03);
    background: rgba(37,99,235,0.85);
}

/* posições */
.left { margin-left: 6%; }
.right { margin-left: auto; margin-right: 6%; }

/* círculo */
.circle {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    margin-right: 12px;
}

.done { background: #22c55e; }
.active { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
.lock { background: #64748b; }

/* info */
.info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.small {
    font-size: 12px;
    color: #94a3b8;
}

/* botão */
.btn {
    background: #22c55e;
    padding: 8px 14px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 13px;
    border: none;
    cursor: pointer;
}

/* bloqueado */
.locked {
    opacity: .45;
}

/* BOTÃO VOLTAR (fixo seguro) */
.back {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 20px;
    z-index: 9999;

    background: linear-gradient(to right,#2563eb,#4f46e5);
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: bold;

    display: flex;
    gap: 8px;
    align-items: center;

    box-shadow: 0 10px 25px rgba(0,0,0,.5);
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>
        <b>FluentCode</b>
        <div class="small">Trilhas de aprendizado 🚀</div>
    </div>
    <i class="fa-solid fa-code text-blue-400"></i>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Escolha sua trilha</h1>
    <div class="small">Aprenda programação passo a passo</div>
</div>

<!-- MAPA -->
<div class="map">

<div class="node left">
    <div class="info">
        <div class="circle done"></div>
        <div>
            <b>Olá Mundo</b>
            <div class="small">Introdução</div>
        </div>
    </div>
    <span>✔</span>
</div>

<div class="node right">
    <div class="info">
        <div class="circle active"></div>
        <div>
            <b>Variáveis</b>
            <div class="small">Tipos de dados</div>
        </div>
    </div>

    <button class="btn" onclick="abrirVariaveis()">
        Continuar
    </button>
</div>

<div class="node left locked">
    <div class="info">
        <div class="circle lock"></div>
        <div>
            <b>Condicionais</b>
            <div class="small">if / else</div>
        </div>
    </div>
    <span>🔒</span>
</div>

<div class="node right locked">
    <div class="info">
        <div class="circle lock"></div>
        <div>
            <b>Loops</b>
            <div class="small">for / while</div>
        </div>
    </div>
    <span>🔒</span>
</div>

</div>

<!-- BOTÃO VOLTAR -->
<div class="back" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</div>

<script>
function abrirVariaveis(){
    window.location.href = "variaveis.html";
}
</script>

</body>
</html>
