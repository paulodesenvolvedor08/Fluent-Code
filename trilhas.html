<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluentCode - Trilhas</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    width: 100%;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header{
    padding:20px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TRILHA */
.track{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    margin-top:20px;
    padding-bottom:100px;
}

/* linha central */
.track::before{
    content:"";
    position:absolute;
    width:6px;
    height:100%;
    background:#334155;
    left:50%;
    transform:translateX(-50%);
    border-radius:10px;
    z-index:0;
}

/* node */
.node{
    width:90%;
    max-width:420px;
    background:#1f2937;
    padding:15px;
    border-radius:18px;
    margin:18px 0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:1;
    transition:.2s;
    position:relative;
}

.node:hover{
    transform:scale(1.03);
    background:#2563eb;
}

/* lado esquerdo */
.left{
    display:flex;
    align-items:center;
    gap:12px;
}

/* círculo */
.circle{
    width:18px;
    height:18px;
    border-radius:50%;
}

.done{ background:#22c55e; }
.active{ background:#3b82f6; box-shadow:0 0 12px #3b82f6; }
.lock{ background:#6b7280; }

.locked{
    opacity:.55;
}

/* BOTÃO VOLTAR */
.back-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:linear-gradient(to right,#2563eb,#4f46e5);
    color:white;
    padding:12px 18px;
    border-radius:14px;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:8px;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
    transition:.2s;
}

.back-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
<div>🚀 FluentCode / Trilhas</div>
</header>

<div class="track">

<!-- 1 -->
<div class="node">
    <div class="left">
        <div class="circle done"></div>
        <div>
            <b>Olá Mundo</b>
            <p style="font-size:12px;color:#94a3b8">Introdução ao Java</p>
        </div>
    </div>
    <span style="color:#22c55e;font-weight:bold">✔</span>
</div>

<!-- 2 -->
<div class="node">
    <div class="left">
        <div class="circle active"></div>
        <div>
            <b>Variáveis</b>
            <p style="font-size:12px;color:#94a3b8">Tipos de dados</p>
        </div>
    </div>
    <button style="background:#2563eb;padding:8px 12px;border-radius:10px;font-size:13px;">
        Continuar
    </button>
</div>

<!-- 3 -->
<div class="node locked">
    <div class="left">
        <div class="circle lock"></div>
        <div>
            <b>Condicionais</b>
            <p style="font-size:12px;color:#94a3b8">if / else</p>
        </div>
    </div>
    <span>🔒 Bloqueado</span>
</div>

<!-- 4 -->
<div class="node locked">
    <div class="left">
        <div class="circle lock"></div>
        <div>
            <b>Loops</b>
            <p style="font-size:12px;color:#94a3b8">for / while</p>
        </div>
    </div>
    <span>🔒 Bloqueado</span>
</div>

<!-- 5 -->
<div class="node locked">
    <div class="left">
        <div class="circle lock"></div>
        <div>
            <b>Projetos</b>
            <p style="font-size:12px;color:#94a3b8">Aplicação prática</p>
        </div>
    </div>
    <span>🔒 Bloqueado</span>
</div>

</div>

<!-- BOTÃO VOLTAR -->
<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</button>

</body>
</html>
