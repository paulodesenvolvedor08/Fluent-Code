<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FluentCode - Trilhas Estilo Duolingo</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    background-color: #111827; 
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* CONTAINER DO CAMINHO */
.duo-path {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    padding: 40px 0 140px 0;
    max-width: 480px;
    margin: 0 auto;
}

/* GRUPO DO MÓDULO + TEXTO */
.level-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 25px 0;
    position: relative;
    z-index: 10;
}

/* BOTÃO DE NÍVEL (MÓDULO CIRCULAR) */
.duo-level {
    position: relative;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    cursor: pointer;
    transition: transform 0.1s ease, filter 0.2s;
}

/* Efeito 3D */
.duo-level::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: -1;
    transform: translateY(6px);
}

.duo-level:active {
    transform: translateY(6px) scale(0.95);
}
.duo-level:active::after {
    transform: translateY(0);
}

/* CORES DOS MÓDULOS */
.lvl-done {
    background: #22c55e;
    border: 2px solid #4ade80;
}
.lvl-done::after { background: #166534; }

.lvl-active {
    background: #3b82f6;
    border: 2px solid #60a5fa;
    animation: pulseGlow 2s infinite alternate;
}
.lvl-active::after { background: #1d4ed8; }

.lvl-locked {
    background: #4b5563;
    border: 2px solid #9ca3af;
    cursor: not-allowed;
    pointer-events: none;
}
.lvl-locked::after { background: #1f2937; }

/* LINHAS CONECTIVAS NO FUNDO */
.svg-connector {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

/* TEXTO DOS MÓDULOS */
.level-title {
    font-size: 0.875rem;
    font-weight: bold;
    margin-top: 12px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    text-align: center;
}

.title-done { color: #4ade80; }
.title-active { color: #60a5fa; }
.title-locked { color: #9ca3af; }

/* TOOLTIP */
.duo-tooltip {
    position: absolute;
    bottom: 100px;
    background: #1f2937;
    border: 2px solid #374151;
    border-radius: 16px;
    padding: 10px 16px;
    text-align: center;
    white-space: nowrap;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    z-index: 20;
}
.duo-tooltip::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 14px;
    height: 14px;
    background: #1f2937;
    border-right: 2px solid #374151;
    border-bottom: 2px solid #374151;
}

@keyframes pulseGlow {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
    100% { transform: scale(1.04); box-shadow: 0 0 15px 4px rgba(59, 130, 246, 0.3); }
}

/* POSICIONAMENTO EM ZIGUE-ZAGUE */
.pos-center { transform: translateX(0); }
.pos-left   { transform: translateX(-45px); }
.pos-right  { transform: translateX(45px); }

/* BOTÃO VOLTAR FIXADO NA LATERAL ESQUERDA INFERIOR */
.back-fixed {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 20px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    padding: 12px 20px;
    border-radius: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    cursor: pointer;
    z-index: 100;
    transition: 0.2s;
}
.back-fixed:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<div class="sticky top-0 bg-gray-900/90 backdrop-blur-md border-b border-gray-800 px-6 py-4 flex justify-between items-center z-50">
    <div class="flex items-center gap-3">
        <span class="text-2xl">⚡</span>
        <div>
            <h1 class="font-black text-lg tracking-wide bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">FLUENTCODE</h1>
            <p class="text-xs text-gray-400">Trilha Fundamentos</p>
        </div>
    </div>
    <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-full border border-gray-700">
        <i class="fa-solid fa-fire text-orange-500"></i>
        <span class="text-xs font-bold text-orange-400">5 Dias</span>
    </div>
</div>

<main class="relative min-h-screen">
    
    <svg class="svg-connector" xmlns="http://www.w3.org/2000/svg">
        <path d="" fill="none" stroke="#374151" stroke-width="10" stroke-linecap="round"/>
        <path d="" fill="none" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
    </svg>

    <div class="duo-path">

        <div class="level-group pos-center">
            <div class="duo-level lvl-done" onclick="alert('Módulo revisado!')">
                <i class="fa-solid fa-check text-white"></i>
                <div class="absolute top-[-30px] bg-green-600 text-[10px] font-black uppercase px-2 py-0.5 rounded-md tracking-wider">Mundo 1</div>
            </div>
            <p class="level-title title-done">Olá Mundo</p>
        </div>

        <div class="level-group pos-left">
            <div class="duo-tooltip">
                <p class="text-xs font-black uppercase text-blue-400 tracking-wider">Próxima Lição!</p>
                <p class="text-sm font-bold text-white">Variáveis e Tipos</p>
            </div>
            <div class="duo-level lvl-active" onclick="abrirVariaveis()">
                <i class="fa-solid fa-star text-white"></i>
            </div>
            <p class="level-title title-active">Variáveis</p>
        </div>

        <div class="level-group pos-right">
            <div class="duo-level lvl-locked">
                <i class="fa-solid fa-lock text-gray-400 text-lg"></i>
            </div>
            <p class="level-title title-locked">Condicionais</p>
        </div>

        <div class="level-group pos-center">
            <div class="duo-level lvl-locked">
                <i class="fa-solid fa-lock text-gray-400 text-lg"></i>
            </div>
            <p class="level-title title-locked">Loops</p>
        </div>

        <div class="level-group pos-left">
            <div class="duo-level lvl-locked">
                <i class="fa-solid fa-trophy text-gray-500 text-lg"></i>
            </div>
            <p class="level-title title-locked">Desafio Final</p>
        </div>

    </div>
</main>

<div class="back-fixed" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Voltar
</div>

<script>
function abrirVariaveis(){
    window.location.href = "variaveis.html";
}

window.addEventListener('resize', ajustarLinhaTrilha);
function ajustarLinhaTrilha() {
    const svg = document.querySelector('.svg-connector');
    const grupos = document.querySelectorAll('.level-group');
    const niveis = document.querySelectorAll('.duo-level');
    if(niveis.length < 2) return;
    
    let d = `M ${grupos[0].offsetLeft + niveis[0].offsetLeft + 42},${grupos[0].offsetTop + niveis[0].offsetTop + 42}`;
    
    for(let i=1; i<niveis.length; i++) {
        let xAnterior = grupos[i-1].offsetLeft + niveis[i-1].offsetLeft + 42;
        let yAnterior = grupos[i-1].offsetTop + niveis[i-1].offsetTop + 42;
        let xAtual = grupos[i].offsetLeft + niveis[i].offsetLeft + 42;
        let yAtual = grupos[i].offsetTop + niveis[i].offsetTop + 42;
        
        let cpY = (yAnterior + yAtual) / 2;
        d += ` C ${xAnterior},${cpY} ${xAtual},${cpY} ${xAtual},${yAtual}`;
    }
    
    svg.querySelectorAll('path')[0].setAttribute('d', d);
    svg.querySelectorAll('path')[1].setAttribute('d', d);
}
setTimeout(ajustarLinhaTrilha, 100);
</script>

</body>
</html>
