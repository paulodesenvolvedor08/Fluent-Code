<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluentCode - Trilha</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    font-family: Arial;
    color:white;
    overflow-x:hidden;
}

/* HEADER */
header{
    padding:20px;
    font-weight:bold;
}

/* CONTAINER */
.map{
    position:relative;
    padding:40px 0 120px;
}

/* LINHA CURVA (SIMULANDO CAMINHO DUOLINGO) */
.map::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:8px;
    height:100%;
    background:linear-gradient(#334155,#1e293b);
    border-radius:20px;
}

/* NODE BASE */
.node{
    width:80%;
    max-width:420px;
    background:#1f2937;
    padding:16px;
    border-radius:20px;
    margin:30px auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    z-index:1;
    transition:.2s;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.node:hover{
    transform:scale(1.03);
    background:#2563eb;
}

/* alternância esquerda/direita estilo Duolingo */
.left { margin-left:5%; }
.right { margin-left:auto; margin-right:5%; }

/* círculo */
.circle{
    width:20px;
    height:20px;
    border-radius:50%;
    margin-right:12px;
}

/* estados */
.done{ background:#22c55e; }
.active{ background:#3b82f6; box-shadow:0 0 15px #3b82f6; }
.lock{ background:#6b7280; }

/* conteúdo */
.info{
    display:flex;
    align-items:center;
    gap:10px;
}

/* botão ativo */
.btn{
    background:#2563eb;
    padding:8px 14px;
    border-radius:12px;
    font-size:13px;
}

/* bloqueado */
.locked{
    opacity:.5;
}

/* BOTÃO VOLTAR */
.back{
    position:fixed;
    bottom:20px;
    left:20px;
    background:linear-gradient(to right,#2563eb,#4f46e5);
    padding:12px 18px;
    border-radius:14px;
    font-weight:bold;
    display:flex;
    gap:8px;
    align-items:center;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}
</style>
</head>

<body>

<header>
🚀 FluentCode / Trilha de Aprendizado
</header>

<div class="map">

<!-- 1 -->
<div class="node left">
    <div class="info">
        <div class="circle done"></div>
        <div>
            <b>Olá Mundo</b>
            <p style="font-size:12px;color:#94a3b8">Primeiro código Java</p>
        </div>
    </div>
    <span>✔</span>
</div>

<!-- 2 -->
<div class="node right">
    <div class="info">
        <div class="circle active"></div>
        <div>
            <b>Variáveis</b>
            <p style="font-size:12px;color:#94a3b8">Tipos de dados</p>
        </div>
    </div>
    <button class="btn">Continuar</button>
</div>

<!-- 3 -->
<div class="node left locked">
    <div class="info">
        <div class="circle lock"></div>
        <div>
            <b>Condicionais</b>
            <p style="font-size:12px;color:#94a3b8">if / else</p>
        </div>
    </div>
    <span>🔒</span>
</div>

<!-- 4 -->
<div class="node right locked">
    <div class="info">
        <div class="circle lock"></div>
        <div>
            <b>Loops</b>
            <p style="font-size:12px;color:#94a3b8">for / while</p>
        </div>
    </div>
    <span>🔒</span>
</div>

<!-- 5 -->
<div class="node left locked">
    <div class="info">
        <div class="circle lock"></div>
        <div>
            <b>Projetos</b>
            <p style="font-size:12px;color:#94a3b8">Aplicação real</p>
        </div>
    </div>
    <span>🔒</span>
</div>

</div>

<!-- BOTÃO VOLTAR -->
<div class="back" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</div>

</body>
</html>
