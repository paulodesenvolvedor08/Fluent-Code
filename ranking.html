<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>FluentCode - Ranking</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    background:#0d1b2a;
    color:white;
}

/* OCUPA A TELA TODA */
.container{
    width:100%;
    max-width:1000px;
    margin:auto;
    min-height:100vh;
}

/* CARD GRANDE (MAIS COMPRIDO) */
.card{
    background:#0f172a;
    border:1px solid #1f2937;
    border-radius:18px;

    padding:18px;

    width:100%;

    min-height:80vh; /* 🔥 AQUI DEIXA COMPRIDO */

    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* ITEM DO RANKING MAIS ALTO */
.rank-item{
    display:flex;
    flex-direction:column;
    gap:10px;

    background:#111c33;
    padding:16px;
    border-radius:14px;

    margin-bottom:12px;

    transition:.2s;
}

.rank-item:hover{
    transform:translateY(-2px);
    border:1px solid #3b82f6;
}

/* LINHA SUPERIOR */
.rank-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TOP 3 */
.top1{ background:linear-gradient(90deg,#fbbf24,#f59e0b); color:black; }
.top2{ background:linear-gradient(90deg,#d1d5db,#9ca3af); color:black; }
.top3{ background:linear-gradient(90deg,#f97316,#ea580c); color:white; }

/* BARRA XP */
.bar{
    width:100%;
    height:10px;
    background:#1f2937;
    border-radius:999px;
    overflow:hidden;
}

.bar-fill{
    height:100%;
    background:#22c55e;
}

/* MOBILE: AINDA MAIS COMPRIDO */
@media(max-width:640px){

    body{
        padding:10px;
    }

    .card{
        min-height:85vh; /* 🔥 ocupa quase toda tela */
        padding:14px;
        border-radius:16px;
    }

    .rank-top{
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
    }

    h1{
        font-size:20px;
        text-align:center;
    }
}

    .voltar-btn{
    position:fixed;
    bottom:20px;
    left:20px;

    background:#2563eb; /* 🔵 azul */
    border:1px solid #1d4ed8;

    padding:14px 16px;
    border-radius:14px;

    display:flex;
    align-items:center;
    gap:8px;

    font-weight:bold;
    color:white;

    box-shadow:0 10px 25px rgba(0,0,0,.4);

    transition:.2s;

    z-index:999;
}

.voltar-btn:hover{
    transform:scale(1.05);
    background:#3b82f6;
}
/* no celular fica menor */
@media(max-width:640px){
    .voltar-btn{
        bottom:20px;
        left:15px;
        padding:12px 14px;
        font-size:14px;
    }
}
</style>
</head>

<body class="p-4 sm:p-6">

<div class="container">

<!-- TOPO -->
<div class="flex flex-col sm:flex-row justify-between items-center gap-3 mb-5">

    <button onclick="window.location.href='index.html'"
     class="voltar-btn">
    <i class="fa-solid fa-arrow-left"></i>
    Voltar
    </button>


<h1 class="text-2xl font-bold">🏆 Ranking FluentCode</h1>

<span class="bg-yellow-600 px-3 py-1 rounded-xl text-sm">
Top Jogadores
</span>

</div>

<!-- CARD -->
<div class="card">

<div id="ranking"></div>

</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("fluentcode_user")) || {
    xp: 0,
    nome: "Você"
};

let ranking = [
    {nome:"Ana", xp:980},
    {nome:"Lucas", xp:850},
    {nome:"Maria", xp:720},
    {nome:user.nome, xp:user.xp},
    {nome:"João", xp:600},
    {nome:"Pedro", xp:450},
];

ranking.sort((a,b)=>b.xp - a.xp);

let html = "";

ranking.forEach((p, index)=>{

let pos = index + 1;

let classe = "rank-item";
if(pos === 1) classe += " top1";
if(pos === 2) classe += " top2";
if(pos === 3) classe += " top3";

let nivel = Math.floor(p.xp / 200);

html += `
<div class="${classe}">

<div class="rank-top">

<strong>#${pos} ${p.nome}</strong>
<strong>${p.xp} XP</strong>

</div>

<div class="text-sm opacity-80">
Nível ${nivel}
</div>

<div class="bar">
<div class="bar-fill" style="width:${(p.xp % 200) / 2}%"></div>
</div>

</div>
`;
});

document.getElementById("ranking").innerHTML = html;

</script>

</body>
</html>
