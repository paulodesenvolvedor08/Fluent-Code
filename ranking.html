<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #0f172a;
    overflow-x: hidden;
    font-family: Arial, Helvetica, sans-serif;
}

/* fundo bonito */
body {
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
}

/* card principal */
.card {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid #1f2937;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* item ranking */
.item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    margin: 10px 0;
    border-radius: 14px;
    background: #1f2937;
    transition: .25s;
}

.item:hover {
    transform: translateY(-3px);
    background: #2563eb;
}

.item.me {
    border: 2px solid #3b82f6;
    background: #1e3a8a;
}

/* avatar */
.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* barra XP */
.progress {
    height: 6px;
    background: #374151;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 6px;
}

.fill {
    height: 100%;
    background: linear-gradient(90deg,#22c55e,#3b82f6);
}

/* medalha */
.badge {
    width: 30px;
    text-align: center;
    font-weight: bold;
}

/* BOTÃO VOLTAR (igual ao seu original) */
.back-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: linear-gradient(to right, #2563eb, #4f46e5);
    color: white;
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: .2s;
}

.back-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #1d4ed8, #4338ca);
}
</style>
</head>

<body>

<div class="max-w-2xl mx-auto p-4">

    <h1 class="text-3xl font-bold text-center mt-4">🏆 Ranking</h1>
    <p class="text-center text-gray-400 mb-6">Top desenvolvedores</p>

    <div class="card">
        <div id="lista"></div>
    </div>

</div>

<!-- BOTÃO VOLTAR -->
<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</button>

<script>

const user = JSON.parse(localStorage.getItem("fluentcode_user")) || {
    nome: "Você",
    xp: 650
};

const ranking = [
    {nome:"Ana", xp:1200},
    {nome:"Lucas", xp:980},
    {nome:"Maria", xp:860},
    {nome:user.nome || "Você", xp:user.xp},
    {nome:"Pedro", xp:500},
    {nome:"João", xp:420}
];

ranking.sort((a,b) => b.xp - a.xp);

let html = "";
let posicaoUser = 0;

ranking.forEach((p,i) => {

    if(p.nome === user.nome) posicaoUser = i+1;

    let medalha = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : i+1;

    html += `
    <div class="item ${p.nome===user.nome ? 'me' : ''}">
        <div class="badge">${medalha}</div>

        <div class="avatar">
            <i class="fa-solid fa-user"></i>
        </div>

        <div style="flex:1">
            <div class="flex justify-between">
                <b>${p.nome}</b>
                <span>${p.xp} XP</span>
            </div>

            <div class="progress">
                <div class="fill" style="width:${p.xp % 100}%"></div>
            </div>
        </div>
    </div>
    `;
});

document.getElementById("lista").innerHTML = html;

</script>

</body>
</html>
