<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>FluentCode - Ranking</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    background:#0d1b2a;
    color:white;
}

/* CONTAINER PRINCIPAL RESPONSIVO */
.container{
    width:100%;
    max-width:900px;
    margin:auto;
}

/* CARD PRINCIPAL */
.card{
    background:#0f172a;
    border:1px solid #1f2937;
    border-radius:18px;

    padding:16px;

    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* ITEM DO RANKING */
.rank-item{
    display:flex;
    flex-direction:column;
    gap:8px;

    background:#111c33;
    padding:14px;
    border-radius:14px;

    margin-bottom:10px;

    transition:.2s;
}

.rank-item:hover{
    transform:translateY(-2px);
    border:1px solid #3b82f6;
}

/* LINHA INTERNA */
.rank-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TOP 3 */
.top1{ background:linear-gradient(90deg,#fbbf24,#f59e0b); color:black; }
.top2{ background:linear-gradient(90deg,#d1d5db,#9ca3af); color:black; }
.top3{ background:linear-gradient(90deg,#f97316,#ea580c); color:white; }

/* BARRA XP */
.bar{
    width:100%;
    height:8px;
    background:#1f2937;
    border-radius:999px;
    overflow:hidden;
}

.bar-fill{
    height:100%;
    background:#22c55e;
}

/* RESPONSIVO MOBILE */
@media(max-width:640px){

    body{
        padding:12px;
    }

    h1{
        font-size:20px;
        text-align:center;
    }

    .card{
        padding:14px;
    }

    .rank-top{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
    }
}
</style>
</head>

<body class="p-4 sm:p-6">

<div class="container">

<!-- TOPO -->
<div class="flex flex-col sm:flex-row justify-between items-center gap-3 mb-5">

<button onclick="window.location.href='index.html'"
class="bg-slate-800 px-4 py-2 rounded-xl w-full sm:w-auto">
<i class="fa-solid fa-arrow-left"></i> Voltar
</button>

<h1 class="text-2xl font-bold">🏆 Ranking FluentCode</h1>

<span class="bg-yellow-600 px-3 py-1 rounded-xl text-sm">
Top Jogadores
</span>

</div>

<!-- CARD -->
<div class="card">

<div id="ranking"></div>

</div>

</div>

<script>

/* 🔥 USUÁRIO LOCAL */
let user = JSON.parse(localStorage.getItem("fluentcode_user")) || {
    xp: 0,
    nome: "Você"
};

/* 🔥 DADOS DO RANKING */
let ranking = [
    {nome:"Ana", xp:980},
    {nome:"Lucas", xp:850},
    {nome:"Maria", xp:720},
    {nome:user.nome, xp:user.xp},
    {nome:"João", xp:600},
    {nome:"Pedro", xp:450},
];

/* ORDENAR */
ranking.sort((a,b)=>b.xp - a.xp);

/* RENDER */
let html = "";

ranking.forEach((p, index)=>{

let pos = index + 1;

let classe = "rank-item";
if(pos === 1) classe += " top1";
if(pos === 2) classe += " top2";
if(pos === 3) classe += " top3";

let nivel = Math.floor(p.xp / 200);

html += `
<div class="${classe}">

<div class="rank-top">

<strong>#${pos} ${p.nome}</strong>
<strong>${p.xp} XP</strong>

</div>

<div class="text-sm opacity-80">
Nível ${nivel}
</div>

<div class="bar">
<div class="bar-fill" style="width:${(p.xp % 200) / 2}%"></div>
</div>

</div>
`;
});

document.getElementById("ranking").innerHTML = html;

</script>

</body>
</html>
