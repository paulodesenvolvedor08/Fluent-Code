<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking - FluentCode</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body { background: #0d1b2a; color: white; font-family: sans-serif; }
    
    .card {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* Estilo das linhas do ranking */
    .rank-item {
        background: #1e293b;
        padding: 16px;
        border-radius: 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: 0.2s;
        border: 2px solid transparent;
    }

    .rank-item:hover { border-color: #3b82f6; transform: translateY(-2px); }
    
    /* Destaque para o usuário */
    .voce { border: 2px solid #3b82f6; background: #1e3a8a; }

    /* Medalhas */
    .rank-num { font-weight: 800; font-size: 1.2rem; min-width: 35px; text-align: center; }
    .top1 { color: #fbbf24; font-size: 1.5rem; }
    .top2 { color: #94a3b8; font-size: 1.5rem; }
    .top3 { color: #ea580c; font-size: 1.5rem; }

    /* Barra de XP */
    .progress-bg { background: #334155; height: 8px; border-radius: 10px; width: 100%; margin-top: 8px; }
    .progress-fill { background: #22c55e; height: 100%; border-radius: 10px; }

    /* Botão Voltar */
    .btn-back {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: bold;
        background: #2563eb;
        transition: .2s;
        text-decoration: none;
        color: white;
    }
    .btn-back:hover { background: #1d4ed8; }

    @media(max-width:640px) {
        .card { padding: 16px; }
    }
</style>
</head>

<body class="p-4 sm:p-6 pb-12">

<div class="max-w-2xl mx-auto">

    <!-- CABEÇALHO -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white">🏆 Ranking</h1>
        <p class="text-gray-400 mt-1">Os melhores Devs da semana</p>
    </div>

    <!-- CARD PRINCIPAL -->
    <div class="card">
        <div id="ranking-list"></div>
    </div>

    <!-- BOTÃO VOLTAR -->
    <button onclick="history.back()"
    class="fixed bottom-6 left-4 
    bg-gradient-to-r from-blue-600 to-indigo-600 
    hover:from-blue-700 hover:to-indigo-700 
    text-white font-bold px-5 py-3 rounded-2xl 
    shadow-lg flex items-center gap-2 z-50 transition">

    <i class="fa-solid fa-arrow-left"></i>
    Voltar
    </button>

    <div class="min-h-screen p-6 flex justify-center">

    <div class="max-w-2xl w-full space-y-6">


</div>

<script>
    // Recupera dados
    let user = JSON.parse(localStorage.getItem("fluentcode_user")) || { xp: 0, nome: "Você" };
    
    let ranking = [
        {nome:"Ana", xp:980},
        {nome:"Lucas", xp:850},
        {nome:"Maria", xp:720},
        {nome:"Você", xp:user.xp},
        {nome:"João", xp:600},
        {nome:"Pedro", xp:450},
    ];

    ranking.sort((a,b) => b.xp - a.xp);

    let html = "";
    ranking.forEach((p, index) => {
        let pos = index + 1;
        let isVoce = p.nome === "Você";
        let nivel = Math.floor(p.xp / 200);
        
        // Ícones de medalha
        let icon = `<span class="rank-num text-gray-400">${pos}º</span>`;
        if(pos === 1) icon = `<span class="rank-num top1"><i class="fa-solid fa-crown"></i></span>`;
        if(pos === 2) icon = `<span class="rank-num top2"><i class="fa-solid fa-medal"></i></span>`;
        if(pos === 3) icon = `<span class="rank-num top3"><i class="fa-solid fa-medal"></i></span>`;

        html += `
        <div class="rank-item ${isVoce ? 'voce' : ''}">
            ${icon}
            <div class="flex-1">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-lg">${p.nome} ${isVoce ? '(Você)' : ''}</span>
                    <span class="font-bold text-green-400">${p.xp} XP</span>
                </div>
                <div class="text-xs text-gray-400">Nível ${nivel}</div>
                <div class="progress-bg">
                    <div class="progress-fill" style="width:${(p.xp % 200) / 2}%"></div>
                </div>
            </div>
        </div>
        `;
    });

    document.getElementById("ranking-list").innerHTML = html;
</script>

</body>
</html>
