<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça Erros Java - FluentCode</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    background: #0d1b2a;
    color: white;
    font-size: 16px;
    padding-bottom: 40px;
}

/* CARD RESPONSIVO */
.card {
    background: #0f172a;
    border: 1px solid #1f2937;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
}

/* CÓDIGO RESPONSIVO */
.code {
    background: #000;
    padding: 20px;
    border-radius: 12px;
    color: #22c55e;
    font-family: 'Courier New', Courier, monospace;
    margin-top: 16px;
    font-size: 17px;
    line-height: 1.8;
    overflow-x: auto;
    word-break: break-all;
}

/* BOTÕES DE RESPOSTA */
.btn {
    padding: 16px;
    border-radius: 12px;
    font-weight: bold;
    width: 100%;
    transition: .2s;
    font-size: 16px;
}

.btn:active {
    transform: scale(0.98);
}

/* BOTÃO VOLTAR */
.btn-back {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: bold;
    background: #2563eb; /* Azul */
    transition: .2s;
}

.btn-back:hover {
    background: #1d4ed8;
}

/* MOBILE AJUSTES */
@media (max-width: 640px) {
    body {
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

    .card {
        padding: 20px;
    }

    .code {
        font-size: 15px;
    }
}
</style>
</head>

<body class="p-4">

<!-- TOPO -->
<div class="text-center mb-8">
    <h1 class="text-2xl font-bold">🐞 Caça Erros Java</h1>
    <span id="fase" class="inline-block mt-2 bg-red-600 px-4 py-1 rounded-full text-sm font-bold">
        Fase 1
    </span>
</div>

<!-- CARD CENTRAL -->
<div class="card">

<p class="text-gray-300 text-center mb-4">
Encontre o erro no código:
</p>

<div id="codigo" class="code"></div>

<!-- BOTÕES DE RESPOSTA -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">

<button onclick="responder(false)"
class="btn bg-red-600 hover:bg-red-500">
Não está correto
</button>

<button onclick="responder(true)"
class="btn bg-green-600 hover:bg-green-500">
Está correto
</button>

</div>

<p id="msg" class="mt-6 font-bold text-center text-lg min-h-[30px]"></p>

</div>

<!-- BOTÃO VOLTAR (AZUL EMBAIXO) -->
<div class="mt-10 text-center">
    <button onclick="window.location.href='atividades.html'" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i> Voltar ao Menu
    </button>
</div>

<script>
/* 🔥 FASES */
const fases = [
    { codigo: "System.out.printn(\"Hello World\");", erro: "println", xp: 100 },
    { codigo: "int x = \"10\";", erro: "tipo errado (String em int)", xp: 120 },
    { codigo: "if x > 5 { System.out.println('OK'); }", erro: "faltam parênteses ()", xp: 150 },
    { codigo: "public static void main(String args) { }", erro: "String[] args", xp: 180 }
];

let faseAtual = 0;

/* 🔁 CARREGAR */
function carregar(){
    let f = fases[faseAtual];
    document.getElementById("fase").innerText = "Fase " + (faseAtual + 1);
    document.getElementById("codigo").innerText = f.codigo;
    document.getElementById("msg").innerText = "";
}

carregar();

/* 🎮 RESPOSTA */
function responder(correto){
    let f = fases[faseAtual];
    let user = JSON.parse(localStorage.getItem("fluentcode_user")) || {xp:0,nivel:0};
    
    // Logica: se o usuario clicar em "Não está correto", ele acertou o desafio
    let acertou = (correto === false);

    if(acertou){
        user.xp += f.xp;
        document.getElementById("msg").innerHTML = "✔ Correto! +" + f.xp + " XP";
        faseAtual++;
        
        if(faseAtual < fases.length){
            setTimeout(() => carregar(), 1200);
        } else {
            document.getElementById("msg").innerHTML = "🏆 Você completou todos os níveis!";
        }
    } else {
        document.getElementById("msg").innerHTML = "❌ Errado! O erro era: " + f.erro;
    }

    localStorage.setItem("fluentcode_user", JSON.stringify(user));
}
</script>

</body>
</html>
