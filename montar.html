<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte o Código - FluentCode</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    background: #0d1b2a;
    color: white;
    font-size: 16px;
    padding-bottom: 50px;
}

#area {
    word-break: break-all;
    min-height: 120px;
    font-family: 'Courier New', Courier, monospace;
}

/* ESTILO DOS BLOCOS DE CÓDIGO */
.bloco {
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    font-family: monospace;
    font-size: 15px;
    font-weight: 600;
    transition: .2s;
    user-select: none;
}

.bloco:hover {
    background: #334155;
    border-color: #64748b;
}

.bloco:active {
    transform: scale(.95);
}

/* BOTÃO VOLTAR */
.btn-back {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: bold;
    background: #2563eb;
    transition: .2s;
}
.btn-back:hover { background: #1d4ed8; }

/* AJUSTES MOBILE */
@media(max-width:640px){
    h1 { font-size: 20px; }
    .bloco { font-size: 14px; padding: 10px; }
}
</style>
</head>

<body class="p-4 sm:p-6">

<!-- TOPO -->
<div class="text-center mb-8">
    <h1 class="text-2xl font-bold">🧩 Monte o Código</h1>
    <span id="fase" class="inline-block mt-2 bg-blue-600 px-4 py-1 rounded-full text-sm font-bold">
        Fase 1
    </span>
</div>

<!-- ÁREA DO CÓDIGO (ONDE MONTA) -->
<div id="area" class="bg-slate-950 border border-cyan-500 rounded-2xl p-6 mb-6 overflow-auto text-green-400 text-lg shadow-inner">
</div>

<!-- BANCO DE BLOCOS -->
<div id="banco" class="grid grid-cols-3 sm:grid-cols-4 gap-3 mb-8">
    <!-- Blocos gerados via JS -->
</div>

<!-- BOTÃO VERIFICAR -->
<div class="text-center">
    <button onclick="verificar()"
    class="bg-green-600 w-full sm:w-auto px-10 py-4 rounded-xl font-bold text-lg hover:bg-green-500 transition shadow-lg">
    Verificar Código
    </button>
    <p id="msg" class="mt-4 font-bold text-lg min-h-[30px]"></p>
</div>

<!-- BOTÃO VOLTAR (AZUL EMBAIXO) -->
<div class="mt-12 text-center">
    <button onclick="window.location.href='atividades.html'" class="fixed bottom-4 left-4 flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-lg transition-all duration-200 z-50">
     <i class="fa-solid fa-arrow-left"></i>
     <span class="font-bold">Voltar</span>
   </button>
</div>

<script>
/* 🔥 FASES DO JOGO */
const fases = [
    {
        titulo: "Hello World",
        codigo: ["System", ".", "out", ".", "println", "(", "'Hello World'", ")", ";"],
        xp: 100
    },
    {
        titulo: "Variável Java",
        codigo: ["int", "x", "=", "10", ";"],
        xp: 120
    },
    {
        titulo: "If simples",
        codigo: ["if", "(", "x", ">", "5", ")", "{", "System", ".", "out", ".", "println", "(", "'Maior'", ")", ";", "}"],
        xp: 150
    }
];

let faseAtual = 0;
let selecionado = [];

/* 🔁 CARREGAR FASE */
function carregarFase(){
    document.getElementById("area").innerHTML = "";
    document.getElementById("banco").innerHTML = "";
    document.getElementById("msg").innerHTML = "";
    selecionado = [];

    let fase = fases[faseAtual];
    document.getElementById("fase").innerText = "Fase " + (faseAtual + 1);

    let banco = [...fase.codigo].sort(() => Math.random() - 0.5);

    banco.forEach(item => {
        let b = document.createElement("span");
        b.innerText = item;
        b.className = "bloco";
        b.onclick = () => {
            selecionado.push(item);
            document.getElementById("area").innerHTML += item;
        };
        document.getElementById("banco").appendChild(b);
    });
}

/* ✅ VERIFICAR */
function verificar(){
    let fase = fases[faseAtual];
    let user = JSON.parse(localStorage.getItem("fluentcode_user")) || {xp:0,nivel:0};

    if(selecionado.join("") === fase.codigo.join("")){
        user.xp += fase.xp;
        document.getElementById("msg").innerHTML = "✔ Correto! +" + fase.xp + " XP";
        faseAtual++;
        
        if(faseAtual < fases.length){
            setTimeout(() => carregarFase(), 1200);
        } else {
            document.getElementById("msg").innerHTML = "🏆 Parabéns! Você completou todas as fases!";
        }
    } else {
        document.getElementById("msg").innerHTML = "❌ Ordem incorreta. Tente novamente!";
    }

    localStorage.setItem("fluentcode_user", JSON.stringify(user));
}

carregarFase();
</script>

</body>
</html>
