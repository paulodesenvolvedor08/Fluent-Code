<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lógica Java - FluentCode</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #0d1b2a;
            color: white;
            /* Evita zoom estranho ao rotacionar o celular */
            -webkit-text-size-adjust: 100%;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
        }
    </style>
</head>

<body class="p-4 min-h-screen flex flex-col justify-between items-center pb-24">

    <div class="w-full max-w-md bg-[#0f172a] border border-gray-800 rounded-2xl p-6 shadow-2xl my-auto">

        <h1 class="text-2xl font-black text-center mb-6 tracking-wide text-blue-400">
            💡 Lógica Java
        </h1>

        <pre id="pergunta" class="text-left bg-slate-950/80 p-5 rounded-xl text-lg mb-6 border border-slate-800 leading-relaxed font-bold text-slate-200">
            ...
        </pre>

        <div id="opcoes" class="grid gap-4 w-full"></div>

        <p id="msg" class="text-center mt-6 text-2xl font-black tracking-wider min-h-[36px]"></p>

    </div>

    <button onclick="window.location.href='atividades.html'" class="fixed bottom-5 left-5 right-5 sm:right-auto flex items-center justify-center gap-3 px-6 py-4 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white rounded-xl shadow-2xl transition-all duration-200 z-50">
        <i class="fa-solid fa-arrow-left text-xl"></i>
        <span class="font-black text-base tracking-wide">Voltar para Atividades</span>
    </button>

    <script>
        const fases = [
            {
                p: "O que será impresso?\n\nint x = 5;\nif(x > 3){\n  System.out.println('A');\n}",
                o: [
                    { t: "A", ok: true },
                    { t: "Nada", ok: false },
                    { t: "Erro", ok: false },
                    { t: "B", ok: false }
                ],
                xp: 120
            },
            {
                p: "Qual o resultado?\n\nfor(int i=0;i<3;i++) { \n  // bloco\n}\nSystem.out.println(i);",
                o: [
                    { t: "Erro (i não existe fora do for)", ok: true },
                    { t: "3", ok: false },
                    { t: "0", ok: false },
                    { t: "1", ok: false }
                ],
                xp: 140
            },
            {
                p: "Qual é o valor final?\n\nint x = 2;\nx = x + 3 * 2;",
                o: [
                    { t: "8", ok: true },
                    { t: "10", ok: false },
                    { t: "7", ok: false },
                    { t: "6", ok: false }
                ],
                xp: 130
            },
            {
                p: "O que acontece?\n\nif(true && false){\n  System.out.println('X');\n}",
                o: [
                    { t: "Nada é impresso", ok: true },
                    { t: "X", ok: false },
                    { t: "Erro", ok: false },
                    { t: "true", ok: false }
                ],
                xp: 110
            }
        ];

        let i = 0;

        function load() {
            let f = fases[i];
            document.getElementById("pergunta").innerText = f.p;

            let op = document.getElementById("opcoes");
            op.innerHTML = "";
            document.getElementById("msg").innerText = "";

            f.o.forEach(x => {
                let b = document.createElement("button");
                b.innerText = x.t;
                // Botões ganharam padding alto (py-4) e texto grande (text-lg) nativo do Tailwind
                b.className = "w-full py-4 px-5 rounded-xl font-bold text-lg bg-slate-800 hover:bg-slate-700 text-slate-100 border border-slate-700 active:bg-slate-600 shadow-md text-left pl-6";
                b.onclick = () => check(x.ok);
                op.appendChild(b);
            });
        }

        function check(ok) {
            let user = JSON.parse(localStorage.getItem("fluentcode_user")) || { xp: 0 };
            let msgElement = document.getElementById("msg");

            if (ok) {
                user.xp += fases[i].xp;
                msgElement.className = "text-center mt-6 text-2xl font-black tracking-wider min-h-[36px] text-green-400";
                msgElement.innerText = "✔ Correto!";
                i++;

                if (i < fases.length) {
                    setTimeout(load, 1000);
                } else {
                    setTimeout(() => {
                        msgElement.className = "text-center mt-6 text-2xl font-black tracking-wider min-h-[36px] text-amber-400";
                        msgElement.innerText = "🏆 Concluído!";
                    }, 1000);
                }
            } else {
                msgElement.className = "text-center mt-6 text-2xl font-black tracking-wider min-h-[36px] text-red-400";
                msgElement.innerText = "❌ Errado!";
            }

            localStorage.setItem("fluentcode_user", JSON.stringify(user));
        }

        load();
    </script>

</body>
</html>
