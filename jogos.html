<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluentCode - Jogos</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    background: #0d1b2a;
    color: white;
}

.card {
    background: linear-gradient(145deg, #134074, #0b2545);
    transition: .3s;
}

.card:hover {
    transform: translateY(-6px);
}
</style>
</head>

<body>

<div class="p-6 max-w-7xl mx-auto">

<!-- TOPO -->
<div class="flex justify-between items-center mb-8">

<button onclick="window.location.href='index.html'"
class="bg-slate-800 px-4 py-2 rounded-xl">
<i class="fa-solid fa-arrow-left"></i> Voltar
</button>

<h1 class="text-3xl font-black">🎮 Central de Jogos</h1>

<div></div>
</div>

<!-- GRID -->
<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">

<!-- CAÇA ERROS -->
<div class="card p-6 rounded-2xl">
<div class="text-5xl">🐞</div>
<h2 class="text-xl font-bold mt-3">Caça Erros Java</h2>
<p class="text-gray-300 text-sm">Encontre erros no código Java.</p>

<button onclick="window.location.href='caca-erros.html'"
class="w-full mt-5 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold">
Jogar
</button>
</div>

<!-- MONTE O CÓDIGO -->
<div class="card p-6 rounded-2xl">
<div class="text-5xl">🧩</div>
<h2 class="text-xl font-bold mt-3">Monte o Código</h2>
<p class="text-gray-300 text-sm">Organize blocos Java corretamente.</p>

<button onclick="window.location.href='montar.html'"
class="w-full mt-5 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold">
Jogar
</button>
</div>


<!-- DESAFIO (opcional) -->
<div class="card p-6 rounded-2xl opacity-60">
<div class="text-5xl">🏆</div>
<h2 class="text-xl font-bold mt-3">Desafio do Dev</h2>
<p class="text-gray-300 text-sm">Nível avançado.</p>

<button disabled
class="w-full mt-5 bg-slate-700 py-3 rounded-xl font-bold cursor-not-allowed">
Bloqueado
</button>
</div>

</div>

</div>

</body>
</html>
