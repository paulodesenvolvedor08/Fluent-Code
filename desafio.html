<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Desafio Final - FluentCode</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0d1b2a;
    color:white;
}

.card{
  background:#0f172a;
    border:1px solid #1f2937;
    border-radius:18px;

    padding:20px;

    width:100%;
}

.btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    transition:.2s;
}

.btn:hover{
    transform:scale(1.02);
}
</style>
</head>

<body class="p-4 sm:p-6">

<div class="card">

<h1 class="text-xl font-bold text-center mb-4">
🚀 Desafio Final
</h1>

<p class="text-center text-gray-300 mb-4">
Último nível — teste sua lógica em Java
</p>

<p id="pergunta" class="text-center text-lg mb-4">
...
</p>

<div id="opcoes" class="grid gap-3"></div>

<p id="msg" class="text-center mt-4 font-bold"></p>

    <div class="mt-10 text-center">
    <button onclick="window.location.href='atividades.html'" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i> Voltar ao Menu
    </button>
        
</div>

</div>

<script>

/* 🔥 DESAFIOS */
const fases = [
{
p:"Qual será a saída?\n\nint x = 1;\nwhile(x < 4){ x++; }\nSystem.out.println(x);",
o:[
{t:"4",ok:true},
{t:"3",ok:false},
{t:"1",ok:false},
{t:"Erro",ok:false}
],
xp:200
},
{
p:"O que acontece aqui?\n\nint[] v = {1,2,3};\nSystem.out.println(v[3]);",
o:[
{t:"Erro (IndexOutOfBounds)",ok:true},
{t:"3",ok:false},
{t:"0",ok:false},
{t:"null",ok:false}
],
xp:220
},
{
p:"Qual é o resultado?\n\nint a = 5;\nint b = 2;\nSystem.out.println(a / b);",
o:[
{t:"2",ok:true},
{t:"2.5",ok:false},
{t:"3",ok:false},
{t:"Erro",ok:false}
],
xp:180
},
{
p:"O que imprime?\n\nboolean x = true;\nboolean y = false;\nSystem.out.println(x || y);",
o:[
{t:"true",ok:true},
{t:"false",ok:false},
{t:"1",ok:false},
{t:"Erro",ok:false}
],
xp:190
},
{
p:"Qual é o valor final?\n\nint x = 10;\nx += 5;\nx *= 2;",
o:[
{t:"30",ok:true},
{t:"20",ok:false},
{t:"25",ok:false},
{t:"15",ok:false}
],
xp:250
}
];

let i = 0;
let bloqueado = false;

/* 🔁 CARREGAR */
function load(){

let f = fases[i];

document.getElementById("pergunta").innerText = f.p;

let op = document.getElementById("opcoes");
op.innerHTML = "";

document.getElementById("msg").innerText = "";

bloqueado = false;

f.o.forEach(x => {

let b = document.createElement("button");

b.innerText = x.t;
b.className = "btn bg-slate-800 hover:bg-slate-700";

b.onclick = () => check(x.ok);

op.appendChild(b);

});

}

/* 🎮 VERIFICAR */
function check(ok){

if(bloqueado) return;
bloqueado = true;

let user = JSON.parse(localStorage.getItem("fluentcode_user")) || {xp:0};

if(ok){

user.xp += fases[i].xp;

document.getElementById("msg").innerText = "✔ Correto!";

i++;

setTimeout(() => {

if(i < fases.length){
load();
}else{
document.getElementById("msg").innerText =
"🏆 Você concluiu o Desafio Final!";
document.getElementById("opcoes").innerHTML = "";
}

}, 900);

}else{

document.getElementById("msg").innerText = "❌ Errado!";

setTimeout(() => {
bloqueado = false;
}, 700);

}

localStorage.setItem("fluentcode_user", JSON.stringify(user));
}

load();

</script>

</body>
</html>
